<!DOCTYPE html>
<html>
<head>
    <title>Debug Login Form</title>
</head>
<body>
    <h2>🔍 Debug Login Form Submission</h2>
    <button onclick="debugFormSubmission()">Debug Form Submission</button>
    <div id="results"></div>

    <script>
        async function debugFormSubmission() {
            const results = document.getElementById('results');
            results.innerHTML = 'Testing form submission...';
            
            try {
                // Test 1: Check if form exists and can be submitted
                console.log('1. Checking form elements...');
                
                // Simulate form data
                const formData = {
                    email: 'biennickwadingan@gmail.com',
                    password: 'password123'
                };
                
                console.log('Form data:', formData);
                
                // Test 2: Direct API call
                console.log('2. Testing direct API call...');
                const startTime = performance.now();
                
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const endTime = performance.now();
                const responseTime = endTime - startTime;
                
                console.log('Response status:', response.status);
                console.log('Response time:', responseTime.toFixed(2) + 'ms');
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Response data:', data);
                    console.log('Token received:', !!data.token);
                    console.log('User ID:', data.userId);
                    
                    results.innerHTML = `
                        <h3>✅ Form Submission Works!</h3>
                        <p><strong>Response Time:</strong> ${responseTime.toFixed(2)}ms</p>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Token:</strong> ${data.token ? 'Received ✅' : 'Not Received ❌'}</p>
                        <p><strong>User ID:</strong> ${data.userId || 'N/A'}</p>
                        <p><strong>Issue:</strong> Frontend form handling problem</p>
                    `;
                } else {
                    results.innerHTML = `
                        <h3>❌ API Call Failed</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Time:</strong> ${responseTime.toFixed(2)}ms</p>
                    `;
                }
                
            } catch (error) {
                console.error('Error:', error);
                results.innerHTML = `
                    <h3>❌ JavaScript Error</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
